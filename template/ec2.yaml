AWSTemplateFormatVersion: "2010-09-09"
Description: EC2 con User Data avanzado y reemplazo forzado v3

Resources:
  MySecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Permitir trafico HTTP entrante
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0

  # ─── CAMBIO CLAVE: Cambiamos MyNewEC2 a MyAdvancedEC2 ───
  # Esto obliga a CloudFormation a crear una máquina NUEVA con el script avanzado
  MyAdvancedEC2:
    Type: AWS::EC2::Instance
    Properties:
      AvailabilityZone: us-east-1a
      ImageId: ami-0cca150d127c2216f
      InstanceType: t3.micro

      NetworkInterfaces:
        - AssociatePublicIpAddress: "true"
          DeviceIndex: "0"
          GroupSet:
            - Fn::GetAtt: [MySecurityGroup, GroupId]

      UserData:
        Fn::Base64: |
          #!/bin/bash
          # 1. Desactivar firewall interno por completo
          systemctl stop firewalld
          systemctl disable firewalld

          # 2. Actualizar sistema e instalar Apache
          yum update -y
          yum install -y httpd

          # 3. Iniciar el servicio web
          systemctl start httpd
          systemctl enable httpd

          # 4. Obtener Metadatos de AWS de forma segura (IMDSv2)
          TOKEN=$(curl -s -X PUT "http://169.254.169.254/latest/api/token" -H "X-aws-ec2-metadata-token-ttl-seconds: 21600")
          INSTANCE_ID=$(curl -s -H "X-aws-ec2-metadata-token: $TOKEN" http://169.254.169.254/latest/meta-data/instance-id)
          PUBLIC_IP=$(curl -s -H "X-aws-ec2-metadata-token: $TOKEN" http://169.254.169.254/latest/meta-data/public-ipv4)
          AZONE=$(curl -s -H "X-aws-ec2-metadata-token: $TOKEN" http://169.254.169.254/latest/meta-data/placement/availability-zone)

          # 5. Escribir página web avanzada con diseño CSS
          cat << EOF > /var/www/html/index.html
          <!DOCTYPE html>
          <html lang="es">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>servidor hackeado por yordy</title>
              <style>
                  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
                  body { background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; color: #333; padding: 20px; }
                  .card { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); max-width: 550px; width: 100%; text-align: center; }
                  .icon { font-size: 50px; color: #4CAF50; margin-bottom: 10px; }
                  h1 { color: #1e3c72; margin-bottom: 15px; font-size: 26px; }
                  p { color: #666; margin-bottom: 30px; font-size: 15px; }
                  .meta-box { background: #f4f6f9; border-left: 5px solid #2a5298; padding: 15px; text-align: left; border-radius: 4px; margin-bottom: 15px; }
                  .meta-line { margin-bottom: 8px; font-size: 14px; font-family: monospace; }
                  .meta-line strong { color: #2a5298; }
                  .footer { font-size: 12px; color: #999; margin-top: 30px; border-top: 1px solid #eee; padding-top: 15px; }
              </style>
          </head>
          <body>
              <div class="card">
                  <div class="icon">✔</div>
                  <h1>solo abelardo en esta pagina, soy keiner </h1>
                  <p>prueba de subir el branchsds</p>
                  <div class="meta-box">
                      <div class="meta-line"><strong>ID de Instancia:</strong> $INSTANCE_ID</div>
                      <div class="meta-line"><strong>IP Pública:</strong> $PUBLIC_IP</div>
                      <div class="meta-line"><strong>Zona de Disponibilidad:</strong> $AZONE</div>
                  </div>
                  <div class="footer">Infraestructura provista por AWS CloudFormation</div>
              </div>
          </body>
          </html>
          EOF

      Tags:
        - Key: Name
          Value: EC2-Avanzada-GitHubActions