name: Destroy EC2

on:
  workflow_dispatch:

jobs:
  destroy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Delete CloudFormation Stack
        run: |
          echo "Iniciando la eliminación del stack ec2-stack-clase-v2..."
          aws cloudformation delete-stack --stack-name ec2-stack-clase-v2

          echo "Esperando a que el stack se elimine por completo..."
          aws cloudformation wait stack-delete-complete --stack-name ec2-stack-clase-v2
          echo "¡Stack eliminado con éxito!"